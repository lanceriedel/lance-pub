<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lance-pub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e0e0f0;
    padding: 48px 24px;
    max-width: 860px;
    margin: 0 auto;
  }
  header { margin-bottom: 40px; border-bottom: 1px solid #2a2a4a; padding-bottom: 24px; }
  header h1 { font-size: 28px; font-weight: 700; color: #fff; }
  header p { color: #666; font-size: 14px; margin-top: 6px; }
  section { margin-bottom: 36px; }
  section h2 {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    color: #5566aa; text-transform: uppercase; margin-bottom: 12px;
    padding-bottom: 6px; border-bottom: 1px solid #1e1e3a;
  }
  .card {
    display: flex; align-items: flex-start; gap: 14px;
    background: #16162a; border: 1px solid #2a2a4a; border-radius: 10px;
    padding: 16px 18px; margin-bottom: 10px;
    text-decoration: none; color: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  .card:hover { border-color: #4455aa; background: #1c1c38; }
  .card .icon { font-size: 22px; line-height: 1; margin-top: 2px; flex-shrink: 0; }
  .card .info h3 { font-size: 16px; font-weight: 600; color: #ffffff; }
  .card .info p { font-size: 13px; color: #777; margin-top: 3px; }
  .card .badge {
    margin-left: auto; font-size: 10px; background: #1e2a1e;
    color: #5a9; border: 1px solid #2a4a2a; border-radius: 4px;
    padding: 2px 7px; white-space: nowrap; flex-shrink: 0; align-self: center;
  }
  .badge.live { background: #1e2a1e; color: #5a9; border-color: #2a4a2a; }
</style>
</head>
<body>

<header>
  <h1>🦊 lance-pub</h1>
  <p>Public pages, dashboards, and tools. Updated automatically.</p>
</header>

<!-- SECTION: Home / IoT -->
<section id="home-iot">
  <h2>🏡 Home / IoT</h2>

  <a class="card" href="/lance-pub/hvac/">
    <div class="icon">🌡</div>
    <div class="info">
      <h3>Island Wood HVAC Dashboard</h3>
      <p>Live temperature monitoring — all 3 zones, setpoints vs actual, indoor vs outdoor. Updated every 30 min.</p>
    </div>
    <span class="badge live">● Live</span>
  </a>

</section>

<!-- ADD NEW SECTIONS BELOW AS NEEDED -->

  <a class="card" href="/lance-pub/subdir/">

    <div class="info"><h3>Title</h3><p>Description</p></div>
    <span class="badge live">● Live</span>
  </a>
</section>
-->

</body>
</html>
